  <script src="projects-data.js"></script>
  <script>
  const dot=document.getElementById('cDot'),ring=document.getElementById('cRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
  document.addEventListener('mousedown',()=>document.body.classList.add('c-click'));
  document.addEventListener('mouseup',()=>document.body.classList.remove('c-click'));
  (function loop(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
  function addHover(el){el.addEventListener('mouseenter',()=>document.body.classList.add('c-hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('c-hover'));}
  document.querySelectorAll('a,button').forEach(addHover);
  const nav=document.getElementById('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>60),{passive:true});
  const hamBtn=document.getElementById('hamBtn'),mobMenu=document.getElementById('mobMenu');
  let mobOpen=false;
  function closeMob(){mobOpen=false;hamBtn.classList.remove('open');mobMenu.classList.remove('open');document.body.style.overflow='';}
  hamBtn.addEventListener('click',()=>{mobOpen=!mobOpen;hamBtn.classList.toggle('open',mobOpen);mobMenu.classList.toggle('open',mobOpen);document.body.style.overflow=mobOpen?'hidden':'';});
  document.querySelectorAll('.mob-lnk').forEach(a=>a.addEventListener('click',closeMob));
  const so=document.getElementById('searchOverlay'),sb=document.getElementById('searchBtn'),sc=document.getElementById('searchClose'),si=document.getElementById('searchInput'),sr=document.getElementById('searchResults');
  function openSearch(){closeMob();so.classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>si.focus(),60);renderSearch('');}
  function closeSearch(){so.classList.remove('open');document.body.style.overflow='';si.value='';}
  sb.addEventListener('click',openSearch);sc.addEventListener('click',closeSearch);
  so.addEventListener('click',e=>{if(e.target===so)closeSearch();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}});
  si.addEventListener('input',()=>renderSearch(si.value));
  function renderSearch(q){
    q=q.trim().toLowerCase();sr.innerHTML='';
    const matched=q.length<1?PROJECTS.slice(0,8):PROJECTS.filter(p=>p.name.toLowerCase().includes(q)||p.location.toLowerCase().includes(q)||p.categoryLabel.toLowerCase().includes(q)).slice(0,10);
    if(!matched.length){sr.innerHTML='<p class="search-empty">No results found.</p>';return;}
    const grp=document.createElement('div');grp.className='search-grp';grp.innerHTML='<div class="search-grp-label">Projects</div>';
    matched.forEach(p=>{const a=document.createElement('a');a.className='search-item';a.href='project.html?id='+p.id;a.innerHTML=`<span class="s-name">${p.name}</span><span class="s-meta">${p.location} · ${p.year}</span>`;a.addEventListener('click',closeSearch);addHover(a);grp.appendChild(a);});
    sr.appendChild(grp);
  }
  const grid=document.getElementById('projGrid'),countEl=document.getElementById('projCount');
  const urlParams=new URLSearchParams(window.location.search);
  let activeCat=urlParams.get('cat')||'all';
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    if(btn.dataset.cat===activeCat){btn.classList.add('active');}else{btn.classList.remove('active');}
    btn.addEventListener('click',()=>{
      activeCat=btn.dataset.cat;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
      renderGrid();
    });
  });
  function renderGrid(){
    grid.innerHTML='';
    const list=activeCat==='all'?PROJECTS:PROJECTS.filter(p=>p.category===activeCat);
    countEl.textContent='Showing '+list.length+' project'+(list.length!==1?'s':'');
    list.forEach(p=>{
      const a=document.createElement('a');a.className='proj-card';a.href='project.html?id='+p.id;
      a.innerHTML=`<img src="${p.thumb}" alt="${p.name}" loading="lazy"><div class="proj-card-info"><div class="pc-cat">${p.categoryLabel}</div><div class="pc-name">${p.name}</div><div class="pc-sub">${p.location} — ${p.year}</div></div>`;
      addHover(a);grid.appendChild(a);
    });
  }
  renderGrid();
  </script>
