<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Magg+Partners</title>
  <link rel="icon" type="image/png" href="assets/assets/Logo/260403_Logo_Magg+Partners_Website_Icon.png">
  <link rel="shortcut icon" type="image/jpeg" href="assets/assets/Logo/favicon.jpg">
  <link rel="apple-touch-icon" href="assets/assets/Logo/260403_Logo_Magg+Partners_Website_Icon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Project Detail Page ─────────────────────────────── */
    .proj-hero {
      position: relative;
      height: 100vh;
      min-height: 640px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 64px 80px;
    }
    .proj-hero-bg {
      position: absolute;
      inset: 0;
      background: center/cover no-repeat;
      transform: scale(1.06);
      transition: transform 10s var(--ease);
    }
    .proj-hero-bg.ready { transform: scale(1); }
    .proj-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.15) 0%,
        rgba(10,10,10,0.05) 35%,
        rgba(10,10,10,0.75) 100%
      );
    }
    .proj-hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 60px;
    }
    .proj-hero-left {}
    .proj-hero-eyebrow {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
    }
    .proj-hero-bg.ready ~ .proj-hero-overlay + .proj-hero-content .proj-hero-eyebrow,
    .ph-animate .proj-hero-eyebrow { opacity:1; transform:translateY(0); }

    .proj-hero-title {
      font-size: clamp(52px, 8vw, 130px);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      line-height: 0.9;
      color: var(--white);
    }
    .proj-hero-title .h1-line { display:block; overflow:hidden; }
    .proj-hero-title .h1-inner {
      display: block;
      transform: translateY(110%);
      transition: transform 1.1s var(--ease);
    }
    .proj-hero-title .h1-inner.out { transform: translateY(0); }
    .proj-hero-title .h1-line:nth-child(1) .h1-inner { transition-delay: 0.65s; }
    .proj-hero-title .h1-line:nth-child(2) .h1-inner { transition-delay: 0.82s; }

    .proj-hero-right {
      flex-shrink: 0;
      text-align: right;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.9s ease 1.2s, transform 0.9s ease 1.2s;
    }
    .proj-hero-right.show { opacity:1; transform:translateY(0); }
    .proj-hero-loc {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(245,240,235,0.7);
      margin-bottom: 4px;
    }
    .proj-hero-year {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--muted);
    }

    /* ── Back Button ──────────────────────────────────────── */
    .proj-back {
      position: absolute;
      top: 120px; left: 64px;
      z-index: 10;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245,240,235,0.65);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color var(--tf);
    }
    .proj-back:hover { color: var(--white); }

    /* ── Overview (SOM-style: sidebar + large text) ──────── */
    .proj-overview {
      background: var(--black);
      padding: 88px 64px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 96px;
      border-bottom: 1px solid var(--border);
    }
    .proj-sidebar-meta { padding-top: 4px; }
    .proj-meta-group { margin-bottom: 30px; }
    .proj-meta-label {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(245,240,235,0.32);
      margin-bottom: 7px;
    }
    .proj-meta-val {
      font-size: 13px;
      font-weight: 300;
      color: var(--white);
      line-height: 1.65;
    }
    .proj-intro-text {
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 300;
      line-height: 1.7;
      color: rgba(245,240,235,0.88);
      letter-spacing: -0.01em;
    }
    .proj-desc-full {
      margin-top: 48px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
      font-size: 15px;
      font-weight: 300;
      line-height: 2;
      color: rgba(245,240,235,0.48);
    }

    /* ── Project Facts (SOM sidebar style) ─────────────────── */
    .proj-facts {
      background: var(--black);
      border-top: 1px solid var(--border);
      padding: 88px 64px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 96px;
    }
    .proj-facts-col {
      position: sticky;
      top: 100px;
      align-self: start;
    }
    .facts-section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 40px;
      letter-spacing: 0.01em;
    }
    .fact-item { margin-bottom: 26px; }
    .fact-item-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }
    .fact-item-val {
      font-size: 14px;
      font-weight: 300;
      color: rgba(245,240,235,0.55);
      line-height: 1.75;
    }
    .fact-collab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      cursor: pointer;
      width: 100%;
      text-align: left;
      letter-spacing: 0.01em;
      margin-bottom: 5px;
    }
    .fact-collab-btn svg {
      width: 13px; height: 13px;
      stroke: rgba(245,240,235,0.5);
      fill: none;
      stroke-width: 2;
      transition: transform 0.35s var(--ease);
      flex-shrink: 0;
    }
    .fact-collab-btn.open svg { transform: rotate(180deg); }
    .fact-collab-list {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.45s var(--ease);
      list-style: none;
      padding: 0; margin: 0;
    }
    .fact-collab-list.open { max-height: 500px; }
    .fact-collab-list li {
      font-size: 14px;
      font-weight: 300;
      color: rgba(245,240,235,0.55);
      line-height: 1.85;
    }
    .proj-facts-right {}
    .proj-facts-right img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0.88);
    }
    .proj-facts-right .facts-img-caption {
      margin-top: 16px;
      font-size: 11px;
      font-weight: 300;
      color: rgba(245,240,235,0.3);
      letter-spacing: 0.06em;
    }

    @media (max-width: 900px) {
      .proj-overview { grid-template-columns: 1fr; gap: 48px; padding: 64px 24px; }
      .proj-facts { grid-template-columns: 1fr; gap: 48px; padding: 64px 24px; }
      .proj-facts-col { position: static; }
    }

    /* ── Related Projects ─────────────────────────────────── */
    .related {
      background: var(--black);
      padding: 120px 64px;
      border-top: 1px solid var(--border);
    }
    .related-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 72px;
    }
    .related-head h2 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      line-height: 0.95;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .related-card {
      position: relative;
      overflow: hidden;
      display: block;
    }
    .related-card img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      filter: brightness(0.7);
      transition: transform 0.9s var(--ease), filter 0.7s ease;
      display: block;
    }
    .related-card:hover img { transform:scale(1.06); filter:brightness(0.4); }
    .related-info {
      position: absolute;
      bottom:0; left:0; right:0;
      padding: 0 28px 24px;
      background: linear-gradient(to top, rgba(10,10,10,0.92) 0%, transparent 100%);
      transform: translateY(16px);
      opacity: 0;
      transition: transform var(--t) var(--ease), opacity var(--t) ease;
    }
    .related-card:hover .related-info { transform:translateY(0); opacity:1; }
    .related-loc {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .related-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    /* ── Bottom Nav ───────────────────────────────────────── */
    .proj-nav-strip {
      background: var(--off-black);
      border-top: 1px solid var(--border);
      padding: 0 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }
    .proj-nav-btn {
      padding: 40px 0;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: color var(--tf);
    }
    .proj-nav-btn:hover { color:var(--white); }
    .proj-nav-btn.right { justify-content:flex-end; text-align:right; }
    .proj-nav-center {
      text-align: center;
      padding: 40px 32px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .proj-nav-center a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(245,240,235,0.35);
      transition: color var(--tf);
    }
    .proj-nav-center a:hover { color:var(--white); }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 900px) {
      .proj-hero { padding:0 24px 60px; }
      .proj-back { left:24px; top:100px; }
      .proj-hero-content { flex-direction:column; align-items:flex-start; gap:16px; }
      .proj-hero-right { text-align:left; }
      .info-strip { padding:0 24px; }
      .proj-body { padding:80px 24px; }
      .proj-intro-text { font-size: clamp(16px, 4.5vw, 22px); }
      .gallery-grid { grid-template-columns:1fr; }
      .gallery-grid .gimg:first-child { grid-column:1; }
      .related { padding:80px 24px; }
      .related-grid { grid-template-columns:1fr; }
      .proj-nav-strip { padding:0 24px; }
    }
  </style>
</head>

  <script>
    /* ── Cursor ──────────────────────────────────────────── */
    const cDot=document.getElementById('cDot'),cRing=document.getElementById('cRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cDot.style.left=mx+'px';cDot.style.top=my+'px';});
    document.addEventListener('mousedown',()=>document.body.classList.add('c-click'));
    document.addEventListener('mouseup',()=>document.body.classList.remove('c-click'));
    (function loop(){rx+=(mx-rx)*0.11;ry+=(my-ry)*0.11;cRing.style.left=rx+'px';cRing.style.top=ry+'px';requestAnimationFrame(loop);})();

    /* ── Nav scroll ──────────────────────────────────────── */
    const navEl=document.getElementById('nav');
    window.addEventListener('scroll',()=>navEl.classList.toggle('scrolled',window.scrollY>72),{passive:true});

    /* ── Overlay Menu ────────────────────────────────────── */
    const ham=document.getElementById('ham'),mob=document.getElementById('mob');
    let mobOpen=false;
    function closeMenu(){mobOpen=false;ham.classList.remove('open');mob.classList.remove('open');document.body.style.overflow='';}
    ham.addEventListener('click',()=>{mobOpen=!mobOpen;ham.classList.toggle('open',mobOpen);mob.classList.toggle('open',mobOpen);document.body.style.overflow=mobOpen?'hidden':'';});
    document.querySelectorAll('.mob-link').forEach(a=>a.addEventListener('click',closeMenu));

    /* ── Search ──────────────────────────────────────────── */
    const searchOverlay=document.getElementById('searchOverlay');
    const searchBtn=document.getElementById('searchBtn');
    const searchClose=document.getElementById('searchClose');
    const searchInput=document.getElementById('searchInput');
    const searchResults=document.getElementById('searchResults');
    const PAGES=[
      {name:'Projects Gallery',meta:'All Projects',href:'projects.html'},
      {name:'Careers',meta:'Join The Team',href:'careers.html'},
      {name:'News & Press',meta:'Latest Articles & Awards',href:'news.html'},
      {name:'Studio',meta:'About Magg+Partners',href:'index.html#people'},
      {name:'Contact',meta:'Get In Touch',href:'index.html#contact'},
    ];
    function openSearch(){closeMenu();searchOverlay.classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>searchInput.focus(),100);runSearch('');}
    function closeSearch(){searchOverlay.classList.remove('open');document.body.style.overflow='';searchInput.value='';}
    searchBtn.addEventListener('click',openSearch);
    searchClose.addEventListener('click',closeSearch);
    searchOverlay.addEventListener('click',e=>{if(e.target===searchOverlay)closeSearch();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}});
    searchInput.addEventListener('input',()=>runSearch(searchInput.value));
    function runSearch(q){
      q=q.trim().toLowerCase();searchResults.innerHTML='';
      const matched=q.length<1?PROJECTS.slice(0,8):PROJECTS.filter(p=>p.name.toLowerCase().includes(q)||p.location.toLowerCase().includes(q)||p.categoryLabel.toLowerCase().includes(q)||(p.type&&p.type.toLowerCase().includes(q))||p.year.includes(q)).slice(0,10);
      const matchedP=q.length<1?PAGES:PAGES.filter(p=>p.name.toLowerCase().includes(q)||p.meta.toLowerCase().includes(q));
      if(!matched.length&&!matchedP.length){searchResults.innerHTML='<p class="search-empty">No results for "'+searchInput.value+'"</p>';return;}
      if(matched.length){const g=document.createElement('div');g.className='search-group';g.innerHTML='<div class="search-group-label">Projects</div>';matched.forEach(p=>{const a=document.createElement('a');a.className='search-result-item';a.href='project.html?id='+p.id;a.innerHTML=`<span class="sri-name">${p.name}</span><span class="sri-meta">${p.location} · ${p.year}</span>`;a.addEventListener('click',closeSearch);searchResults.appendChild(a);});searchResults.appendChild(g);}
      if(matchedP.length){const g=document.createElement('div');g.className='search-group';g.innerHTML='<div class="search-group-label">Pages</div>';matchedP.forEach(p=>{const a=document.createElement('a');a.className='search-result-item';a.href=p.href;a.innerHTML=`<span class="sri-name">${p.name}</span><span class="sri-meta">${p.meta}</span>`;a.addEventListener('click',closeSearch);g.appendChild(a);});searchResults.appendChild(g);}
    }

    /* ── Cursor hover ────────────────────────────────────── */
    function addHover(el){el.addEventListener('mouseenter',()=>document.body.classList.add('c-hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('c-hover'));}

    /* ── Scroll Reveal ───────────────────────────────────── */
    const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});},{threshold:0.08,rootMargin:'0px 0px -48px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

    /* ── Load Project ────────────────────────────────────── */
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const idx = PROJECTS.findIndex(p => p.id === id);
    const project = idx !== -1 ? PROJECTS[idx] : PROJECTS[0];

    document.title = `${project.name} — Magg+Partners`;

    /* ── Hero Carousel (same as homepage) ───────────────── */
    const carousel   = document.getElementById('heroCarousel');
    const dotsWrap   = document.getElementById('carouselDots');
    const prevBtn2   = document.getElementById('carouselPrev');
    const nextBtn2   = document.getElementById('carouselNext');

    /* Build slides: hero first, then gallery — deduplicated */
    const slideImages = [project.hero, ...project.gallery.filter(s => s !== project.hero)];
    let heroIdx   = 0;
    let heroTimer = null;

    /* Build slides + dots — only first slide loads immediately */
    slideImages.forEach((src, i) => {
      const isFirst = i === 0;

      /* slide */
      const slide = document.createElement('div');
      slide.className = 'hc-slide' + (isFirst ? ' active' : '');
      slide.dataset.src = src;

      /* blurred background */
      const bg = document.createElement('div');
      bg.className = 'hc-slide-bg';
      if (isFirst) bg.style.backgroundImage = `url('${src}')`;
      slide.appendChild(bg);

      /* sharp foreground — full image, no cropping */
      const im = document.createElement('img');
      if (isFirst) {
        im.src = src;
      } else {
        im.dataset.src = src;
      }
      im.alt = project.name + ' — image ' + (i + 1);
      slide.appendChild(im);
      carousel.appendChild(slide);

      /* dot — button like homepage */
      const dot = document.createElement('button');
      dot.className = 'carousel-dot' + (isFirst ? ' active' : '');
      dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
      dot.addEventListener('click', () => heroGoTo(i));
      dotsWrap.appendChild(dot);
    });

    /* Load a slide's image on demand */
    function loadSlide(slide) {
      const im = slide.querySelector('img');
      const bg = slide.querySelector('.hc-slide-bg');
      if (im && im.dataset.src) { im.src = im.dataset.src; delete im.dataset.src; }
      if (bg && !bg.style.backgroundImage && slide.dataset.src) {
        bg.style.backgroundImage = `url('${slide.dataset.src}')`;
      }
    }

    function heroGoTo(n) {
      const allSlides = carousel.querySelectorAll('.hc-slide');
      const allDots   = dotsWrap.querySelectorAll('.carousel-dot');
      allSlides[heroIdx].classList.remove('active');
      allSlides[heroIdx].classList.add('exit');
      const exiting = heroIdx;
      setTimeout(() => allSlides[exiting] && allSlides[exiting].classList.remove('exit'), 1300);
      allDots[heroIdx].classList.remove('active');
      heroIdx = ((n % slideImages.length) + slideImages.length) % slideImages.length;
      loadSlide(allSlides[heroIdx]);
      /* preload next */
      loadSlide(allSlides[(heroIdx + 1) % slideImages.length]);
      allSlides[heroIdx].classList.add('active');
      allDots[heroIdx].classList.add('active');
      clearInterval(heroTimer);
      heroTimer = setInterval(() => heroGoTo(heroIdx + 1), 5500);
    }

    heroTimer = setInterval(() => heroGoTo(heroIdx + 1), 5500);
    prevBtn2.addEventListener('click', () => heroGoTo(heroIdx - 1));
    nextBtn2.addEventListener('click', () => heroGoTo(heroIdx + 1));

    /* ── Hero text animate ───────────────────────────────── */
    setTimeout(() => {
      document.getElementById('projHeroRight').classList.add('show');
      const eyebrow = document.getElementById('projEyebrow');
      eyebrow.textContent = `${project.categoryLabel} — ${project.num}`;
      eyebrow.style.opacity = '1';
      eyebrow.style.transform = 'translateY(0)';
      const titleEl = document.getElementById('projTitle');
      const words = project.name.split(' ');
      titleEl.innerHTML = words.map(w =>
        `<span class="h1-line"><span class="h1-inner">${w}</span></span>`
      ).join('');
      setTimeout(() => {
        titleEl.querySelectorAll('.h1-inner').forEach((el, i) => {
          setTimeout(() => el.classList.add('out'), i * 150);
        });
      }, 50);
    }, 300);

    document.getElementById('projLoc').textContent = project.location;
    document.getElementById('projYear').textContent = project.year;

    /* ── Overview sidebar ────────────────────────────────── */
    document.getElementById('projClientVal').textContent  = project.client || '—';
    document.getElementById('projTypeVal').textContent    = project.categoryLabel || project.type || '—';
    document.getElementById('projLocVal').textContent     = project.location || '—';
    document.getElementById('projYearVal').textContent    = project.year || '—';
    document.getElementById('projBriefText').textContent  = project.brief || '';
    document.getElementById('projDescText').textContent   = project.description || '';

    /* ── Project Facts (SOM sidebar style) ───────────────── */
    (function renderFacts() {
      const f = project.facts || {};
      const factsEl = document.getElementById('projFacts');

      /* Build fact items */
      const items = [];

      const status = f.status || project.status;
      if (status) items.push({ label: 'Status', val: status });

      const cy = f.completionYear || project.year;
      if (cy) items.push({ label: 'Completion Year', val: cy });

      if (f.designFinishYear) items.push({ label: 'Design Finish Year', val: f.designFinishYear });

      /* Size */
      const sizeObj = f.size;
      if (sizeObj && typeof sizeObj === 'object') {
        const lines = [
          sizeObj.siteArea  ? `Site Area: ${sizeObj.siteArea}`            : null,
          sizeObj.stories   ? `Number of Stories: ${sizeObj.stories}`     : null,
          sizeObj.grossArea ? `Building Gross Area: ${sizeObj.grossArea}` : null,
        ].filter(Boolean);
        if (lines.length) items.push({ label: 'Size', lines });
      } else if (project.size && project.size !== '—') {
        items.push({ label: 'Size', val: project.size });
      }

      /* Sustainability */
      const cert = f.sustainability;
      if (cert) {
        const certLines = Array.isArray(cert) ? cert : [cert];
        items.push({ label: 'Sustainability Certifications', lines: certLines });
      }

      /* Collaborators — expandable */
      const collab = f.collaborators;
      const hasCollab = collab && collab.length;

      if (!items.length && !hasCollab) { factsEl.style.display = 'none'; return; }

      /* Render left sidebar */
      const sidebarHTML = `
        <div class="proj-facts-col">
          <div class="facts-section-title">Project Facts</div>
          ${items.map(item => `
            <div class="fact-item">
              <div class="fact-item-label">${item.label}</div>
              <div class="fact-item-val">
                ${item.lines
                  ? item.lines.join('<br>')
                  : (item.val || '')}
              </div>
            </div>
          `).join('')}
          ${hasCollab ? `
            <div class="fact-item">
              <button class="fact-collab-btn" id="collabToggle">
                Collaborators
                <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <ul class="fact-collab-list" id="collabList">
                ${collab.map(c => `<li>${c}</li>`).join('')}
              </ul>
            </div>
          ` : ''}
        </div>`;

      /* Render right image */
      const rightHTML = `
        <div class="proj-facts-right">
          <img src="${project.hero}" alt="${project.name}" loading="lazy">
          <div class="facts-img-caption">${project.location} — ${project.year}</div>
        </div>`;

      factsEl.innerHTML = sidebarHTML + rightHTML;

      /* Wire collaborators toggle */
      const togBtn  = factsEl.querySelector('#collabToggle');
      const togList = factsEl.querySelector('#collabList');
      if (togBtn && togList) {
        togBtn.addEventListener('click', () => {
          const open = togList.classList.toggle('open');
          togBtn.classList.toggle('open', open);
        });
        addHover(togBtn);
      }
    })();

    /* ── Gallery ─────────────────────────────────────────── */
    const gal = document.getElementById('gallery');
    gal.innerHTML = project.gallery.map((src, i) =>
      `<div class="gimg"><img src="${src}" alt="${project.name} ${i+1}" loading="${i===0?'eager':'lazy'}"></div>`
    ).join('');

    /* ── Related ─────────────────────────────────────────── */
    const others = PROJECTS.filter(p => p.id !== project.id && p.category === project.category).slice(0,3);
    const related = others.length >= 3 ? others :
      [...others, ...PROJECTS.filter(p => p.id !== project.id && !others.includes(p))].slice(0,3);
    document.getElementById('related').innerHTML = related.map(p =>
      `<a class="related-card" href="project.html?id=${p.id}">
        <img src="${p.thumb}" alt="${p.name}" loading="lazy">
        <div class="related-info">
          <div class="related-loc">${p.location}</div>
          <div class="related-name">${p.name}</div>
        </div>
      </a>`).join('');
    document.querySelectorAll('.related-card').forEach(addHover);

    /* ── Prev / Next ─────────────────────────────────────── */
    const prevP = PROJECTS[(idx - 1 + PROJECTS.length) % PROJECTS.length];
    const nextP = PROJECTS[(idx + 1) % PROJECTS.length];
    document.getElementById('prevBtn').href = `project.html?id=${prevP.id}`;
    document.getElementById('prevBtn').innerHTML = `← ${prevP.name}`;
    document.getElementById('nextBtn').href = `project.html?id=${nextP.id}`;
    document.getElementById('nextBtn').innerHTML = `${nextP.name} →`;
    [document.getElementById('prevBtn'), document.getElementById('nextBtn')].forEach(addHover);
  </script>
</body>
</html>
